##############################################################
# docker-compose.yml
# Infraestructura Local Inmutable
# Entornos: Staging (puerto 3001) y Producción (puerto 3000)
# Monitoreo: Prometheus (9090) + Grafana (3333)
# CI/CD:     Jenkins (8080)
##############################################################

version: "3.9"

networks:
  devops-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {}
  jenkins_data: {}
  postgres_staging_data: {}
  postgres_prod_data: {}

# ── Servicios de aplicación ──────────────────────────────────────────
services:

  mysql-db:  # <--- Este es el nombre del servicio
    image: mysql:8.0
    container_name: restaurante-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: restaurante_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql # Guarda los datos en tu carpeta local
    networks:
      - devops-net

  web:
    build: ./app  # <--- Esto le dice a Docker que use el Dockerfile local
    image: restaurante-app # <--- Nombre que le dará a la imagen construida
  # ── STAGING ────────────────────────────────────────────────────────
  app-staging:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
    container_name: restaurante-staging
    image: restaurante-app:staging
    environment:
      NODE_ENV: staging
      PORT: 3000
      JWT_SECRET: staging_secret_change_me
      APP_VERSION: "${APP_VERSION:-1.0.0}"
    ports:
      - "3001:3000"
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      environment: staging
      app: restaurante
    restart: unless-stopped

  # ── PRODUCCIÓN (Blue) ───────────────────────────────────────────────
  app-prod-blue:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
    container_name: restaurante-prod-blue
    image: restaurante-app:production
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: prod_secret_CHANGE_ME_IN_REAL_ENV
      APP_VERSION: "${APP_VERSION:-1.0.0}"
    ports:
      - "3000:3000"
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      environment: production
      slot: blue
      app: restaurante
    restart: unless-stopped

  # ── PRODUCCIÓN (Green - standby para Blue-Green deploy) ─────────────
  app-prod-green:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
    container_name: restaurante-prod-green
    image: restaurante-app:production-green
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: prod_secret_CHANGE_ME_IN_REAL_ENV
      APP_VERSION: "${APP_VERSION:-1.0.0}-green"
    ports:
      - "3002:3000"   # Puerto alternativo (el proxy/LB decide cuál sirve)
    networks:
      - devops-net
    labels:
      environment: production
      slot: green
      app: restaurante
    restart: unless-stopped
    profiles:
      - green-deploy  # Solo se levanta en despliegue blue-green

  # ── NGINX Load Balancer (Blue-Green proxy) ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/blue.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - devops-net
    depends_on:
      - app-prod-blue
    restart: unless-stopped

  # ── JENKINS (CI Server) ─────────────────────────────────────────────
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: jenkins-custom:latest
    container_name: jenkins-ci
    user: root
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
    ports:
      - "8087:8080"
      - "50000:50000"
    networks:
      - devops-net
    restart: unless-stopped

  # ── PROMETHEUS ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - devops-net
      - monitoring-net
    restart: unless-stopped

  # ── GRAFANA ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: devops2024
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/restaurante.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3333:3000"
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── NODE EXPORTER (métricas del host) ───────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring-net
    restart: unless-stopped

  # ── CADVISOR (métricas de contenedores) ─────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    networks:
      - monitoring-net
    restart: unless-stopped
